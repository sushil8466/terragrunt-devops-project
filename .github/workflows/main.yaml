name: Build Push and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  docker:
    runs-on: ubuntu-latest

    env:
      ECR_REPOSITORY: terragrunt-devops-project-app
      ECR_REGISTRY: 395516497310.dkr.ecr.ap-south-1.amazonaws.com
      AWS_REGION: ap-south-1
      IMAGE_TAG: v${{ github.run_number }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: docker build -t $ECR_REPOSITORY:$IMAGE_TAG ./app

      - name: Tag Docker Image
        run: docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Push Docker Image
        run: docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update Kubernetes Manifest
        run: |
          sed -i "s|image:.*|image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|" k8s/deployment.yaml

      - name: Commit and Push Manifest
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add k8s/deployment.yaml

          git commit -m "Update image to $IMAGE_TAG" || echo "No changes to commit"

          git push origin main
